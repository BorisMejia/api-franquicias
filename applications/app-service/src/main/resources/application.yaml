server:
  port: 8080
spring:
  application:
    name: "api-franquicias"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
adapters:
  r2dbc:
    host: "localhost"
    port: 5435
    database: "franquicia_db"
    schema: "public"
    username: "franquicia_user"
    password: "franquicia_pass"
  data:
    r2dbc:
      repositories: null
      enabled: true
spring-doc:
  api-docs:
    path: "/v3/api-docs"
  swagger-ui:
    path: "/swagger"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
